<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Video - AI Video Factory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #020617; color: #e2e8f0; }
        .sidebar { transition: all 0.3s ease; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.05); }
        input, textarea, select { 
            background: rgba(255, 255, 255, 0.05) !important; 
            border: 1px solid rgba(255,255,255,0.1) !important; 
            color: white !important; 
            border-radius: 0.75rem;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            --tw-ring-color: #3b82f6;
            --tw-ring-offset-shadow: var(--tw-ring-inset) 0 0 0 var(--tw-ring-offset-width) var(--tw-ring-offset-color);
            --tw-ring-shadow: var(--tw-ring-inset) 0 0 0 calc(2px + var(--tw-ring-offset-width)) var(--tw-ring-color);
            box-shadow: var(--tw-ring-offset-shadow), var(--tw-ring-shadow), var(--tw-shadow, 0 0 #0000);
        }
    </style>
</head>
<body class="min-h-screen flex">
    <!-- Sidebar (Same as Dashboard) -->
    <aside class="w-64 sidebar glass-card border-r fixed h-full z-20">
        <div class="p-6">
            <h2 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-robot text-blue-500"></i> AI Factory
            </h2>
        </div>
        <nav class="mt-4 px-4 space-y-2">
            <a href="/dashboard" class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-500/10"><i class="fas fa-home w-5 text-center"></i> Dashboard</a>
            <a href="/create-video" class="flex items-center gap-3 p-3 rounded-xl bg-blue-600/20 text-blue-400 font-bold"><i class="fas fa-plus w-5 text-center"></i> Create Video</a>
            <!-- Other links -->
            {% if user.is_owner %}
            <a href="/admin/users" class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-500/10"><i class="fas fa-users-cog w-5 text-center"></i> User Management</a>
            {% endif %}
            <div class="!mt-auto pt-4 border-t border-white/5">
                <a href="/logout" class="flex items-center gap-3 p-3 rounded-xl hover:bg-red-500/10 text-red-400"><i class="fas fa-sign-out-alt w-5 text-center"></i> Logout</a>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="ml-64 flex-1 p-8">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">Create New Video</h1>
            <div class="text-sm text-gray-500">User: {{ user.id }}</div>
        </header>

        <form id="video-form" class="space-y-8 pb-20">
            <!-- Main Form Section -->
            <div class="glass-card p-8 rounded-3xl space-y-6">
                <h3 class="font-bold text-lg flex items-center gap-2"><i class="fas fa-info-circle text-blue-400"></i> Video Details</h3>
                
                <div>
                    <label for="topic" class="block text-sm font-medium text-gray-300 mb-2">Video Topic / Idea</label>
                    <textarea id="topic" name="topic" rows="3" class="w-full px-4 py-2" placeholder="What is this video about? e.g., 'The history of black holes'"></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="language" class="block text-sm font-medium text-gray-300 mb-2">Narration Language</label>
                        <select id="language" name="language" class="w-full px-3 py-3">
                            <option value="en-US">English (US)</option>
                            <option value="hi-IN">Hindi (India)</option>
                            <option value="en-IN">English (India)</option>
                            <option value="es-ES">Spanish</option>
                            <option value="fr-FR">French</option>
                        </select>
                    </div>
                    <div>
                        <label for="style" class="block text-sm font-medium text-gray-300 mb-2">Video Style</label>
                        <select id="style" name="style" class="w-full px-3 py-3">
                            <option value="informative">Informative</option>
                            <option value="storytelling">Storytelling</option>
                            <option value="funny">Funny</option>
                            <option value="inspirational">Inspirational</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <div class="flex justify-end">
                <button type="submit" id="submit-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl transition-all flex items-center gap-2">
                    <i class="fas fa-magic"></i> Generate Video
                </button>
            </div>
        </form>

        <!-- Status & Result Section -->
        <div id="status-container" class="hidden mt-8 glass-card p-6 rounded-3xl">
            <h3 class="font-bold mb-4">Generation Progress</h3>
            <div id="status-message" class="text-gray-400"></div>
            <div class="w-full bg-gray-700 rounded-full h-2.5 mt-4">
                <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
            </div>
            <div id="result-link" class="mt-4"></div>
        </div>
    </main>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const videoForm = document.getElementById('video-form');
    const submitBtn = document.getElementById('submit-btn');
    const statusContainer = document.getElementById('status-container');
    const statusMessage = document.getElementById('status-message');
    const progressBar = document.getElementById('progress-bar');
    const resultLink = document.getElementById('result-link');

    videoForm.addEventListener('submit', async function(event) {
        event.preventDefault();
        
        const topic = document.getElementById('topic').value.trim();
        if (!topic) {
            alert('Please enter a video topic.');
            return;
        }

        // Reset UI
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
        statusContainer.classList.remove('hidden');
        statusMessage.textContent = 'Initializing...';
        progressBar.style.width = '0%';
        resultLink.innerHTML = '';

        try {
            const formData = new FormData(videoForm);
            const response = await fetch('/api/generate-video', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.detail || 'Failed to start generation.');
            }

            const data = await response.json();
            pollStatus(data.task_id);

        } catch (error) {
            statusMessage.textContent = `Error: ${error.message}`;
            statusMessage.classList.add('text-red-400');
            resetSubmitButton();
        }
    });

    function pollStatus(taskId) {
        const interval = setInterval(async () => {
            try {
                const response = await fetch(`/api/generation-status/${taskId}`);
                if (!response.ok) throw new Error('Could not get status.');
                
                const data = await response.json();

                statusMessage.textContent = `Status: ${data.message}`;
                progressBar.style.width = `${data.progress}%`;

                if (data.status === 'completed') {
                    clearInterval(interval);
                    statusMessage.textContent = 'Video generation completed successfully!';
                    resultLink.innerHTML = `<a href="${data.url}" target="_blank" class="text-blue-400 font-bold hover:underline">Download Your Video</a>`;
                    resetSubmitButton();
                } else if (data.status === 'failed') {
                    clearInterval(interval);
                    statusMessage.textContent = `Generation failed: ${data.message}`;
                    statusMessage.classList.add('text-red-400');
                    resetSubmitButton();
                }
            } catch (error) {
                clearInterval(interval);
                statusMessage.textContent = `Error polling status: ${error.message}`;
                statusMessage.classList.add('text-red-400');
                resetSubmitButton();
            }
        }, 3000); // Poll every 3 seconds
    }

    function resetSubmitButton() {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="fas fa-magic"></i> Generate Video';
    }
});
</script>

</body>
</html>
