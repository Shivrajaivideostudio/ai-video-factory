<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Factory - Access Request</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full glass p-8 rounded-3xl text-center shadow-2xl">
        <div class="mb-6">
            <div class="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/50">
                <i class="fas fa-video text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold mb-2 tracking-tight">AI Video Factory</h1>
            <p class="text-gray-400">Full-stack AI-Powered Video Automation Platform</p>
        </div>

        <div class="space-y-6">
            <div class="bg-blue-500/10 border border-blue-500/20 p-4 rounded-xl text-sm text-blue-300">
                सिस्टम एक्सेस के लिए ओनर से अनुमति आवश्यक है। कृपया नीचे दिए गए बटन का उपयोग करके अनुरोध भेजें।
            </div>

            <a href="{{ whatsapp_link }}" target="_blank" class="flex items-center justify-center gap-3 w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl transition-all transform hover:scale-105">
                <i class="fab fa-whatsapp text-2xl"></i>
                Request System Access
            </a>

            <div class="pt-4 border-t border-gray-700">
                <p class="text-gray-500 text-sm mb-4">यदि आपके पास पहले से एक्सेस है:</p>
                <a href="/login" class="text-blue-400 hover:text-blue-300 font-medium underline">Owner Login</a>
            </div>
        </div>
    </div>
</body>
</html>
